name: Build Unsigned IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      # AppIntents requires iOS 16+ deployment target
      - name: Build app (no signing)
        run: |
          xcodebuild clean build \
            -project TransmitBLE.xcodeproj \
            -scheme TransmitBLE \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            IPHONEOS_DEPLOYMENT_TARGET=16.0 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR=${{ github.workspace }}/build/Release-iphoneos

      - name: Package into IPA
        run: |
          mkdir -p ${{ github.workspace }}/ipa/Payload
          cp -r ${{ github.workspace }}/build/Release-iphoneos/TransmitBLE.app \
                ${{ github.workspace }}/ipa/Payload/TransmitBLE.app
          cd ${{ github.workspace }}/ipa
          zip -r ../TransmitBLE-unsigned.ipa Payload

      - name: Create Release and Upload IPA
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: TransmitBLE-unsigned.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}